services:
  - type: web
    name: train-reservation-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npx prisma generate
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: train-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TRAIN_SEARCH_API_URL
        value: https://cttrainsapi.confirmtkt.com/api/v1/trains/search
